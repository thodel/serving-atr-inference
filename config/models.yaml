# ATR model registry — single source of truth for /models.
#
# Each entry is a ModelSpec (see src/atr_serving/registry.py). The gateway only
# reads this file; engines load the weights. Selection (script/lang/century ->
# model) is done client-side by agentic_historian/model_selector.py against this
# metadata.
#
# residency:  pinned = always resident; lazy = load on first request, LRU-evict.
# gpu_affinity: fixed GPU index, or null = ModelManager decides.
# NOTE: vram_mb values are rough estimates — refine after Phase 3 measurements.
#
# asterAIx placement (see docs/asteraix-environment.md): GPU 0 is SHARED with a
# live RAG service (~10 GB), GPU 1 is free. Default everything to GPU 1; the
# ModelManager uses GPU 0 only as overflow when nvidia-smi shows room.

models:
  # ── VLM OCR — served by vLLM (subprocesses managed by ModelManager) ───────
  # GPU 1 only (GPU 0 is the shared RAG GPU). LightOnOCR is pinned + line-level;
  # the two 8B Qwen fine-tunes are lazy (one resident at a time, LRU-evicted).
  - id: lightonocr-catmus-caroline
    engine: vllm
    hf_repo: wjbmattingly/LightOnOCR-2-1B-catmus-caroline
    base_model: lightonai/LightOnOCR-2-1B-base
    task: ocr
    level: line          # LightOnOCR expects cropped line images, not full pages
    languages: [la]
    scripts: [Caroline]
    centuries: [9, 10, 11, 12]
    vram_mb: 3000
    residency: pinned
    gpu_affinity: 1

  - id: qwen3vl-8b-old-church-slavonic
    engine: vllm
    hf_repo: wjbmattingly/Qwen3-VL-8B-old-church-slavonic-line-3-epochs
    base_model: Qwen/Qwen3-VL-8B-Instruct
    task: ocr
    level: line          # "line-3-epochs" — trained on line crops
    languages: [cu]
    scripts: [Cyrillic, Glagolitic]
    centuries: [10, 11, 12, 13, 14]
    vram_mb: 18000
    residency: lazy
    gpu_affinity: 1

  - id: qwen3vl-8b-hebrew
    engine: vllm
    hf_repo: wjbmattingly/Qwen3-VL-8B-hebrew-3-epochs
    base_model: Qwen/Qwen3-VL-8B-Instruct
    task: ocr
    level: page          # full-page input
    languages: [he]
    scripts: [Hebrew]
    centuries: [13, 14, 15, 16, 17, 18]
    vram_mb: 18000
    residency: lazy
    gpu_affinity: 1

  # ── Party HTR — its own always-on service (runs for every image) ──────────
  - id: party
    engine: party
    zenodo_id: "10.5281/zenodo.20642057"
    task: htr
    level: page
    languages: [mul]
    scripts: [Medieval]
    centuries: [13, 14, 15, 16]
    vram_mb: 2000
    residency: pinned
    gpu_affinity: 1

  # ── TrOCR (line-level, vision-encoder-decoder seq2seq) ────────────────────
  - id: trocr-medieval-escriptmask
    engine: trocr
    hf_repo: dh-unibe/trocr-medieval-escriptmask
    task: htr
    level: line
    languages: [de, fr, la, nl]
    scripts: [Medieval]
    centuries: [13, 14, 15, 16]
    vram_mb: 1500
    residency: pinned
    gpu_affinity: 1

  - id: trocr-kurrent-xvi-xvii
    engine: trocr
    hf_repo: dh-unibe/trocr-kurrent-XVI-XVII
    task: htr
    level: line
    languages: [de]
    scripts: [Kurrent]
    centuries: [16, 17, 18]
    vram_mb: 1500
    residency: pinned
    gpu_affinity: 1

  - id: trocr-essoins-middle-latin
    engine: trocr
    hf_repo: dh-unibe/trocr-essoins-middle-latin
    task: htr
    level: line
    languages: [la]
    scripts: [Medieval]
    centuries: [13, 14, 15]
    vram_mb: 1500
    residency: pinned
    gpu_affinity: 1

